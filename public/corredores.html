<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corredores</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.4);
        }
        
        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 500px;
            border-radius: 5px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            margin: 0;
        }
        
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            background: none;
        }
        
        .close:hover {
            color: #000;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        
        .btn-save, .btn-cancel {
            padding: 10px 20px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .btn-save {
            background-color: #4CAF50;
            color: white;
        }
        
        .btn-save:hover {
            background-color: #45a049;
        }
        
        .btn-cancel {
            background-color: #f44336;
            color: white;
        }
        
        .btn-cancel:hover {
            background-color: #da190b;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        table th, table td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        
        table th {
            background-color: #4CAF50;
            color: white;
        }
        
        table tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        
        .btn-edit, .btn-delete {
            padding: 5px 10px;
            margin: 0 5px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .btn-edit {
            background-color: #2196F3;
            color: white;
        }
        
        .btn-delete {
            background-color: #f44336;
            color: white;
        }
        
        .search-container {
            margin: 20px 0;
        }
        
        .search-container input {
            width: 300px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        
        .btn-novo {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        
        .btn-novo:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div id="sidebar"></div>
    
    <div class="container">
        <h1>Gestão de Corredores</h1>
        
        <div>
            <button class="btn-novo" onclick="abrirModal()">+ Novo Corredor</button>
        </div>
        
        <div class="search-container">
            <input type="text" id="filtroNome" placeholder="Filtrar por nome..." onkeyup="filtrarCorredores()">
        </div>
        
        <table id="tabelaCorredores">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Turma</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="bodyTabela">
            </tbody>
        </table>
    </div>
    
    <!-- Modal -->
    <div id="modalCorredor" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitulo">Novo Corredor</h2>
                <button class="close" onclick="fecharModal()">&times;</button>
            </div>
            <form onsubmit="salvarCorredor(event)">
                <input type="hidden" id="corredor-id">
                <div class="form-group">
                    <label for="corredor-nome">Nome:</label>
                    <input type="text" id="corredor-nome" required>
                </div>
                <div class="form-group">
                    <label for="corredor-turma">Turma:</label>
                    <input type="text" id="corredor-turma" required>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn-save">Salvar</button>
                    <button type="button" class="btn-cancel" onclick="fecharModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="sidebar.js"></script>
    <script>
        // Renderizar sidebar
        renderSidebar('corredores');
        
        // Abrir modal para novo corredor
        function abrirModal(id = null) {
            const modal = document.getElementById('modalCorredor');
            const titulo = document.getElementById('modalTitulo');
            const corredorId = document.getElementById('corredor-id');
            const corredorNome = document.getElementById('corredor-nome');
            const corredorTurma = document.getElementById('corredor-turma');
            
            corredorNome.value = '';
            corredorTurma.value = '';
            
            if (id) {
                titulo.textContent = 'Editar Corredor';
                corredorId.value = id;
                // Implementar busca e preenchimento dos dados
            } else {
                titulo.textContent = 'Novo Corredor';
                corredorId.value = '';
            }
            
            modal.style.display = 'block';
        }
        
        // Fechar modal
        function fecharModal() {
            const modal = document.getElementById('modalCorredor');
            modal.style.display = 'none';
        }
        
        // Salvar corredor
        function salvarCorredor(event) {
            event.preventDefault();
            
            const id = document.getElementById('corredor-id').value;
            const nome = document.getElementById('corredor-nome').value;
            const turma = document.getElementById('corredor-turma').value;
            
            const dados = { nome, turma };
            
            if (id) {
                // Atualizar
                fetch(`/api/corredores/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                })
                .then(r => {
                    if (!r.ok) throw new Error('Erro ao atualizar corredor');
                    return r.json();
                })
                .then(data => {
                    alert('Corredor atualizado com sucesso!');
                    fecharModal();
                    carregarCorredores();
                })
                .catch(err => alert('Erro: ' + err.message));
            } else {
                // Criar novo
                fetch('/api/corredores', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...dados, senha: '123456' })
                })
                .then(r => {
                    if (!r.ok) throw new Error('Erro ao criar corredor');
                    return r.json();
                })
                .then(data => {
                    alert('Corredor criado com sucesso!');
                    fecharModal();
                    carregarCorredores();
                })
                .catch(err => alert('Erro: ' + err.message));
            }
        }
        
        // Deletar corredor
        function deletarCorredor(id) {
            if (confirm('Tem certeza que deseja deletar este corredor?')) {
                fetch(`/api/corredores/${id}`, {
                    method: 'DELETE'
                })
                .then(r => {
                    if (!r.ok) throw new Error('Erro ao deletar corredor');
                    return r.json();
                })
                .then(data => {
                    alert('Corredor deletado com sucesso!');
                    carregarCorredores();
                })
                .catch(err => alert('Erro: ' + err.message));
            }
        }
        
        // Editar corredor
        function editarCorredor(id) {
            abrirModal(id);
        }
        
        // Carregar corredores
        function carregarCorredores() {
            fetch('/api/corredores/cadastrados')
            .then(r => {
                if (!r.ok) throw new Error('Erro ao carregar corredores');
                return r.json();
            })
            .then(data => {
                const tbody = document.getElementById('bodyTabela');
                tbody.innerHTML = '';
                
                data.forEach(corredor => {
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td>${corredor.id}</td>
                        <td>${corredor.nome}</td>
                        <td>${corredor.turma}</td>
                        <td>
                            <button class="btn-edit" onclick="editarCorredor(${corredor.id})">Editar</button>
                            <button class="btn-delete" onclick="deletarCorredor(${corredor.id})">Deletar</button>
                        </td>
                    `;
                });
            })
            .catch(err => alert('Erro: ' + err.message));
        }
        
        // Filtrar corredores
        function filtrarCorredores() {
            const filtro = document.getElementById('filtroNome').value.toLowerCase();
            const linhas = document.querySelectorAll('#bodyTabela tr');
            
            linhas.forEach(linha => {
                const nome = linha.cells[1].textContent.toLowerCase();
                if (nome.includes(filtro)) {
                    linha.style.display = '';
                } else {
                    linha.style.display = 'none';
                }
            });
        }
        
        // Carregar corredores na página
        window.onload = function() {
            carregarCorredores();
        };
        
        // Fechar modal ao clicar fora
        window.onclick = function(event) {
            const modal = document.getElementById('modalCorredor');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        };
    </script>
</body>
</html>
